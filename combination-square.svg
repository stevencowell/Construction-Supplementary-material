<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="240" height="120" viewBox="0 0 720 240" role="img" aria-labelledby="title desc">
  <title id="title">Combination square set diagram</title>
  <desc id="desc">More realistic black and white line illustration of a combination square set showing the steel blade, the square head with scriber and spirit level, a protractor head with a revolving turret and locking nut, and a center head.</desc>

  <g fill="none" stroke="#000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Blade -->
    <rect x="30" y="70" width="660" height="28" rx="4" fill="#fff"/>
    <!-- Major graduations -->
    <line x1="60" y1="70" x2="60" y2="98"/>
    <line x1="110" y1="70" x2="110" y2="98"/>
    <line x1="160" y1="70" x2="160" y2="98"/>
    <line x1="210" y1="70" x2="210" y2="98"/>
    <line x1="260" y1="70" x2="260" y2="98"/>
    <line x1="310" y1="70" x2="310" y2="98"/>
    <line x1="360" y1="70" x2="360" y2="98"/>
    <line x1="410" y1="70" x2="410" y2="98"/>
    <line x1="460" y1="70" x2="460" y2="98"/>
    <line x1="510" y1="70" x2="510" y2="98"/>
    <line x1="560" y1="70" x2="560" y2="98"/>
    <line x1="610" y1="70" x2="610" y2="98"/>
    <line x1="660" y1="70" x2="660" y2="98"/>
    <!-- Minor graduations -->
    <line x1="40" y1="70" x2="40" y2="86"/>
    <line x1="50" y1="70" x2="50" y2="86"/>
    <line x1="70" y1="70" x2="70" y2="86"/>
    <line x1="80" y1="70" x2="80" y2="86"/>
    <line x1="90" y1="70" x2="90" y2="86"/>
    <line x1="100" y1="70" x2="100" y2="86"/>
    <line x1="120" y1="70" x2="120" y2="86"/>
    <line x1="130" y1="70" x2="130" y2="86"/>
    <line x1="140" y1="70" x2="140" y2="86"/>
    <line x1="150" y1="70" x2="150" y2="86"/>
    <line x1="170" y1="70" x2="170" y2="86"/>
    <line x1="180" y1="70" x2="180" y2="86"/>
    <line x1="190" y1="70" x2="190" y2="86"/>
    <line x1="200" y1="70" x2="200" y2="86"/>
    <line x1="220" y1="70" x2="220" y2="86"/>
    <line x1="230" y1="70" x2="230" y2="86"/>
    <line x1="240" y1="70" x2="240" y2="86"/>
    <line x1="250" y1="70" x2="250" y2="86"/>
    <line x1="270" y1="70" x2="270" y2="86"/>
    <line x1="280" y1="70" x2="280" y2="86"/>
    <line x1="290" y1="70" x2="290" y2="86"/>
    <line x1="300" y1="70" x2="300" y2="86"/>
    <line x1="320" y1="70" x2="320" y2="86"/>
    <line x1="330" y1="70" x2="330" y2="86"/>
    <line x1="340" y1="70" x2="340" y2="86"/>
    <line x1="350" y1="70" x2="350" y2="86"/>
    <line x1="370" y1="70" x2="370" y2="86"/>
    <line x1="380" y1="70" x2="380" y2="86"/>
    <line x1="390" y1="70" x2="390" y2="86"/>
    <line x1="400" y1="70" x2="400" y2="86"/>
    <line x1="420" y1="70" x2="420" y2="86"/>
    <line x1="430" y1="70" x2="430" y2="86"/>
    <line x1="440" y1="70" x2="440" y2="86"/>
    <line x1="450" y1="70" x2="450" y2="86"/>
    <line x1="470" y1="70" x2="470" y2="86"/>
    <line x1="480" y1="70" x2="480" y2="86"/>
    <line x1="490" y1="70" x2="490" y2="86"/>
    <line x1="500" y1="70" x2="500" y2="86"/>
    <line x1="520" y1="70" x2="520" y2="86"/>
    <line x1="530" y1="70" x2="530" y2="86"/>
    <line x1="540" y1="70" x2="540" y2="86"/>
    <line x1="550" y1="70" x2="550" y2="86"/>
    <line x1="570" y1="70" x2="570" y2="86"/>
    <line x1="580" y1="70" x2="580" y2="86"/>
