  <!-- Square head -->
  <g fill="none" stroke="#000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Foot/stock -->
    <rect x="58" y="70" width="22" height="130" fill="#fff"/>
    <!-- Body with 45° face -->
    <path d="M80 70 L220 70 L140 200 L80 200 Z" fill="#fff"/>
    <line x1="80" y1="200" x2="220" y2="70"/>
    <!-- Spirit level -->
    <circle cx="140" cy="140" r="14" fill="#fff"/>
    <circle cx="140" cy="140" r="5"/>
    <!-- Depth rod -->
    <line x1="140" y1="140" x2="140" y2="200"/>
    <!-- Blade screw -->
    <circle cx="105" cy="86" r="6" fill="#fff"/>
    <!-- Scriber at the top -->
    <rect x="66" y="50" width="14" height="20" rx="2" fill="#fff"/>
    <circle cx="73" cy="48" r="4" fill="#fff"/>
  </g>

  <!-- Protractor head -->
  <g fill="none" stroke="#000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Seat under the blade -->
    <rect x="320" y="70" width="80" height="24" rx="6" fill="#fff"/>
    <!-- Revolving turret -->
    <circle cx="360" cy="148" r="56" fill="#fff"/>
    <circle cx="360" cy="148" r="36" fill="#fff"/>
    <circle cx="360" cy="148" r="16" fill="#fff"/>
    <line x1="344" y1="148" x2="376" y2="148"/>
    <!-- Locking nut at centre -->
    <circle cx="360" cy="148" r="7" fill="#fff"/>
    <!-- Grip/handle silhouette -->
    <path d="M416 124 C438 144 438 172 400 188" fill="#fff"/>
  </g>

  <!-- Center head -->
  <g fill="none" stroke="#000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Slot against blade -->
    <rect x="642" y="70" width="16" height="130" fill="#fff"/>
    <!-- V arms -->
    <line x1="590" y1="200" x2="650" y2="120"/>
    <line x1="710" y1="200" x2="650" y2="120"/>
    <!-- Locking nut -->
    <circle cx="650" cy="88" r="9" fill="#fff"/>
    <circle cx="650" cy="88" r="4"/>
  </g>
</svg>