<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="240" height="120" viewBox="0 0 240 120" role="img" aria-labelledby="title desc">
  <title id="title">Combination square illustration</title>
  <desc id="desc">Black and white line drawing showing the ruler blade and the square head with 90 and 45 degree faces.</desc>
  <g fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Blade -->
    <rect x="36" y="24" width="180" height="14" rx="2" fill="#fff"/>
    <!-- Graduations -->
    <line x1="46" y1="24" x2="46" y2="38"/>
    <line x1="56" y1="24" x2="56" y2="34"/>
    <line x1="66" y1="24" x2="66" y2="34"/>
    <line x1="76" y1="24" x2="76" y2="34"/>
    <line x1="86" y1="24" x2="86" y2="38"/>
    <line x1="96" y1="24" x2="96" y2="34"/>
    <line x1="106" y1="24" x2="106" y2="34"/>
    <line x1="116" y1="24" x2="116" y2="34"/>
    <line x1="126" y1="24" x2="126" y2="38"/>
    <line x1="136" y1="24" x2="136" y2="34"/>
    <line x1="146" y1="24" x2="146" y2="34"/>
    <line x1="156" y1="24" x2="156" y2="34"/>
    <line x1="166" y1="24" x2="166" y2="38"/>
    <line x1="176" y1="24" x2="176" y2="34"/>
    <line x1="186" y1="24" x2="186" y2="34"/>
    <line x1="196" y1="24" x2="196" y2="34"/>
    <line x1="206" y1="24" x2="206" y2="38"/>
    <!-- Square head body -->
    <rect x="64" y="38" width="58" height="58" fill="#fff"/>
    <!-- 45-degree face -->
    <line x1="64" y1="96" x2="122" y2="38"/>
    <!-- Inner vial circle -->
    <circle cx="93" cy="67" r="8" fill="#fff"/>
    <!-- Foot/stock -->
    <rect x="52" y="38" width="12" height="58" fill="#fff"/>
    <!-- Depth rod -->
    <line x1="93" y1="67" x2="93" y2="96"/>
    <!-- Blade screw -->
    <circle cx="80" cy="50" r="4" fill="#fff"/>
  </g>
</svg>